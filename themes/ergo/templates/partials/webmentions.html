{% if config.extra.webmention_provider == "webmentions_io" %}
<section class="webmentions" id="webmentions-wrap" aria-labelledby="webmentions-heading">
  <h3 class="webmentions-heading" id="webmentions-heading">Webmentions</h3>
  <p class="webmentions-intro">
    Reply from your own site with a <a href="https://indieweb.org/Webmention" target="_blank" rel="noopener">webmention</a>; they are always welcome.
  </p>

  <div id="webmentions-list" class="webmentions-list" aria-live="polite">
    <p class="webmentions-empty">No webmentions yet. Be the first!</p>
  </div>
</section>

<script>
  (function () {
    var target = encodeURIComponent("{{ page.permalink }}");
    var list = document.getElementById("webmentions-list");
    if (!list) return;

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function (char) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char];
      });
    }

    function safeUrl(value) {
      var url = String(value || "");
      return /^https?:\/\//i.test(url) ? url : "#";
    }

    function authorName(mention) {
      return (mention.author && mention.author.name) ? mention.author.name : "Someone";
    }

    function authorPhoto(mention) {
      return mention.author && mention.author.photo ? safeUrl(mention.author.photo) : "";
    }

    function formatDate(value) {
      if (!value) return "";
      var date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function plural(count, singular, pluralValue) {
      return count === 1 ? singular : (pluralValue || singular + "s");
    }

    function nameLink(mention) {
      var name = authorName(mention);
      var href = safeUrl((mention.author && mention.author.url) || mention.url);
      return "<a class='wm-name-link' href='" + escapeHtml(href) + "' target='_blank' rel='noopener'>" + escapeHtml(name) + "</a>";
    }

    function nameList(items) {
      return items.map(nameLink).join(", ");
    }

    function renderReply(mention) {
      var author = authorName(mention);
      var authorText = escapeHtml(author);
      var type = mention["wm-property"] || "mention-of";
      var label = type === "in-reply-to" ? "replied" : "mentioned this";
      var content = (mention.content && mention.content.text)
        ? "<p class='wm-content'>" + escapeHtml(mention.content.text.slice(0, 300)) + "</p>"
        : "";
      var published = formatDate(mention.published);
      var dateText = published ? " " + escapeHtml(published) : "";
      return "<li class='wm-response wm-response-reply'><span class='wm-response-icon' aria-hidden='true'>▰</span><div class='wm-response-text'><a href='" + escapeHtml(safeUrl((mention.author && mention.author.url) || mention.url)) + "' class='wm-author' target='_blank' rel='noopener'>" + authorText + "</a> <span class='wm-label'>" + escapeHtml(label) + dateText + ":</span>" + content + "</div></li>";
    }

    function renderReactionRow(icon, items, verb) {
      if (!items.length) return "";
      return "<li class='wm-response wm-response-reaction'><span class='wm-response-icon' aria-hidden='true'>" + escapeHtml(icon) + "</span><div class='wm-response-text'><strong>" + items.length + " " + escapeHtml(plural(items.length, "person", "people")) + " " + escapeHtml(verb) + " this:</strong> " + nameList(items) + "</div></li>";
    }

    fetch("https://webmention.io/api/mentions.jf2?target=" + target + "&per-page=50")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var items = data.children || [];
        var heading = document.getElementById("webmentions-heading");
        if (heading && items.length) heading.textContent = "Webmentions (" + items.length + ")";
        if (!items.length) return;
        var replies = [];
        var likes = [];
        var reposts = [];
        var bookmarks = [];
        items.forEach(function (mention) {
          var type = mention["wm-property"] || "mention-of";
          if (type === "like-of") likes.push(mention);
          else if (type === "repost-of") reposts.push(mention);
          else if (type === "bookmark-of") bookmarks.push(mention);
          else replies.push(mention);
        });
        replies.sort(function (a, b) {
          return new Date(a.published || 0) - new Date(b.published || 0);
        });

        var html = "";
        html += renderReactionRow("♥", likes, "liked");
        html += renderReactionRow("↻", reposts, "reposted");
        html += renderReactionRow("▮", bookmarks, "bookmarked");
        html += replies.map(renderReply).join("");
        list.innerHTML = html ? "<ul class='wm-responses'>" + html + "</ul>" : list.innerHTML;
      })
      .catch(function () {});
  })();
</script>
{% endif %}
