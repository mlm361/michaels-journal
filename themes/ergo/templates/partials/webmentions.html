{% if config.extra.webmention_provider == "webmentions_io" %}
<section class="webmentions" id="webmentions-wrap" aria-labelledby="webmentions-heading">
  <h3 class="webmentions-heading" id="webmentions-heading">Responses</h3>
  <form class="webmention-form"
        action="{{ config.extra.webmention_endpoint }}"
        method="post"
        target="_blank">
    <p class="webmention-help">
      You can respond with a <a href="https://indieweb.org/Webmention" target="_blank" rel="noopener">webmention</a>.
      Publish a reply on your own site, then paste its URL here.
    </p>
    <input type="hidden" name="target" value="{{ page.permalink }}">
    <label class="webmention-label" for="webmention-source">URL</label>
    <div class="webmention-submit-row">
      <input id="webmention-source"
             class="webmention-source"
             type="url"
             name="source"
             placeholder="https://example.com/my-reply"
             autocomplete="url"
             required>
      <button class="webmention-submit" type="submit">Ping!</button>
    </div>
  </form>

  <div id="webmentions-list" class="webmentions-list" aria-live="polite">
    <p class="webmentions-empty">No responses yet. Be the first to respond.</p>
  </div>
</section>

<style>
  .webmentions {
    margin: 2.5rem 0 1rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(128,128,128,0.15);
  }

  .webmentions-heading {
    font-size: 1rem;
    font-weight: 700;
    margin: 0 0 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(128,128,128,0.15);
  }

  .webmentions-list {
    margin-top: 1.25rem;
  }

  .webmentions-empty {
    margin: 0;
    font-style: italic;
    opacity: 0.72;
  }

  .wm-responses {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .wm-response {
    display: grid;
    grid-template-columns: 1.2rem 1fr;
    gap: 0.55rem;
    margin: 0.75rem 0;
    align-items: baseline;
    font-size: 0.9rem;
    line-height: 1.55;
  }

  .wm-response-icon {
    text-align: center;
    opacity: 0.82;
  }

  .wm-response-text {
    min-width: 0;
  }

  .wm-author,
  .wm-name-link {
    font-weight: 700;
    text-decoration: none;
  }

  .wm-author:hover,
  .wm-name-link:hover {
    text-decoration: underline;
  }

  .wm-label {
    opacity: 0.65;
  }

  .wm-content {
    margin: 0.4rem 0 0;
    opacity: 0.8;
    font-style: italic;
  }

  .webmention-form {
    margin-bottom: 1.25rem;
  }

  .webmention-help {
    margin: 0 0 0.7rem;
    font-size: 0.92rem;
    line-height: 1.55;
  }

  .webmention-label {
    display: block;
    margin-bottom: 0.35rem;
    font-size: 0.82rem;
    font-weight: 600;
    opacity: 0.75;
  }

  .webmention-submit-row {
    display: flex;
    gap: 0;
    max-width: 36rem;
  }

  .webmention-source {
    flex: 1;
    min-width: 0;
    box-sizing: border-box;
    padding: 0.55rem 0.7rem;
    border: 1px solid rgba(128,128,128,0.28);
    border-right: 0;
    border-radius: 6px 0 0 6px;
    background: transparent;
    color: inherit;
    font: inherit;
  }

  .webmention-submit {
    flex-shrink: 0;
    padding: 0.55rem 0.95rem;
    border: 1px solid currentColor;
    border-radius: 0 6px 6px 0;
    background: transparent;
    color: inherit;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  .webmention-source:focus-visible,
  .webmention-submit:focus-visible {
    outline: 2px solid currentColor;
    outline-offset: 3px;
  }

  .webmention-submit:hover {
    opacity: 0.72;
  }

  @media (max-width: 640px) {
    .webmention-submit-row {
      display: block;
    }

    .webmention-source,
    .webmention-submit {
      width: 100%;
    }

    .webmention-source {
      border-right: 1px solid rgba(128,128,128,0.28);
      border-radius: 6px;
    }

    .webmention-submit {
      margin-top: 0.65rem;
      border-radius: 6px;
    }
  }
</style>

<script>
  (function () {
    var target = encodeURIComponent("{{ page.permalink }}");
    var list = document.getElementById("webmentions-list");
    if (!list) return;

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function (char) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char];
      });
    }

    function safeUrl(value) {
      var url = String(value || "");
      return /^https?:\/\//i.test(url) ? url : "#";
    }

    function authorName(mention) {
      return (mention.author && mention.author.name) ? mention.author.name : "Someone";
    }

    function authorPhoto(mention) {
      return mention.author && mention.author.photo ? safeUrl(mention.author.photo) : "";
    }

    function formatDate(value) {
      if (!value) return "";
      var date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function plural(count, singular, pluralValue) {
      return count === 1 ? singular : (pluralValue || singular + "s");
    }

    function nameLink(mention) {
      var name = authorName(mention);
      var href = safeUrl((mention.author && mention.author.url) || mention.url);
      return "<a class='wm-name-link' href='" + escapeHtml(href) + "' target='_blank' rel='noopener'>" + escapeHtml(name) + "</a>";
    }

    function nameList(items) {
      return items.map(nameLink).join(", ");
    }

    function renderReply(mention) {
      var author = authorName(mention);
      var authorText = escapeHtml(author);
      var type = mention["wm-property"] || "mention-of";
      var label = type === "in-reply-to" ? "replied" : "mentioned this";
      var content = (mention.content && mention.content.text)
        ? "<p class='wm-content'>" + escapeHtml(mention.content.text.slice(0, 300)) + "</p>"
        : "";
      var published = formatDate(mention.published);
      var dateText = published ? " " + escapeHtml(published) : "";
      return "<li class='wm-response wm-response-reply'><span class='wm-response-icon' aria-hidden='true'>▰</span><div class='wm-response-text'><a href='" + escapeHtml(safeUrl((mention.author && mention.author.url) || mention.url)) + "' class='wm-author' target='_blank' rel='noopener'>" + authorText + "</a> <span class='wm-label'>" + escapeHtml(label) + dateText + ":</span>" + content + "</div></li>";
    }

    function renderReactionRow(icon, items, verb) {
      if (!items.length) return "";
      return "<li class='wm-response wm-response-reaction'><span class='wm-response-icon' aria-hidden='true'>" + escapeHtml(icon) + "</span><div class='wm-response-text'><strong>" + items.length + " " + escapeHtml(plural(items.length, "person", "people")) + " " + escapeHtml(verb) + " this:</strong> " + nameList(items) + "</div></li>";
    }

    fetch("https://webmention.io/api/mentions.jf2?target=" + target + "&per-page=50")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var items = data.children || [];
        var heading = document.getElementById("webmentions-heading");
        if (heading && items.length) heading.textContent = "Responses (" + items.length + ")";
        if (!items.length) return;
        var replies = [];
        var likes = [];
        var reposts = [];
        var bookmarks = [];
        items.forEach(function (mention) {
          var type = mention["wm-property"] || "mention-of";
          if (type === "like-of") likes.push(mention);
          else if (type === "repost-of") reposts.push(mention);
          else if (type === "bookmark-of") bookmarks.push(mention);
          else replies.push(mention);
        });
        replies.sort(function (a, b) {
          return new Date(a.published || 0) - new Date(b.published || 0);
        });

        var html = "";
        html += renderReactionRow("♥", likes, "liked");
        html += renderReactionRow("↻", reposts, "reposted");
        html += renderReactionRow("▮", bookmarks, "bookmarked");
        html += replies.map(renderReply).join("");
        list.innerHTML = html ? "<ul class='wm-responses'>" + html + "</ul>" : list.innerHTML;
      })
      .catch(function () {});
  })();
</script>
{% endif %}
