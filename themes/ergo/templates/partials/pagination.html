{% if paginator.number_pagers > 1 %}
<nav class="pager" aria-label="Pagination" data-current-page="{{ paginator.current_index }}" data-total-pages="{{ paginator.number_pagers }}">
  {% if paginator.current_index > 1 %}
    <a class="pager-button" href="{{ paginator.first }}" aria-label="First page">«</a>
    <a class="pager-button" rel="prev" href="{{ paginator.previous }}" aria-label="Previous page">‹</a>
  {% else %}
    <span class="pager-button pager-button-disabled" aria-hidden="true">«</span>
    <span class="pager-button pager-button-disabled" aria-hidden="true">‹</span>
  {% endif %}

  <label class="pager-current">
    <span class="sr-only">Current page</span>
    <input class="pager-input" type="text" inputmode="numeric" pattern="[0-9]*" value="{{ paginator.current_index }}" aria-label="Current page">
    <span class="pager-total">/{{ paginator.number_pagers }}</span>
  </label>

  {% if paginator.current_index < paginator.number_pagers %}
    <a class="pager-button" rel="next" href="{{ paginator.next }}" aria-label="Next page">›</a>
    <a class="pager-button" href="{{ paginator.last }}" aria-label="Last page">»</a>
  {% else %}
    <span class="pager-button pager-button-disabled" aria-hidden="true">›</span>
    <span class="pager-button pager-button-disabled" aria-hidden="true">»</span>
  {% endif %}
</nav>

<script>
(function () {
  document.querySelectorAll('.pager').forEach(function (pager) {
    var input = pager.querySelector('.pager-input');
    if (!input) return;
    var current = parseInt(pager.getAttribute('data-current-page'), 10) || 1;
    var total = parseInt(pager.getAttribute('data-total-pages'), 10) || 1;

    function pageUrl(page) {
      if (page <= 1) return '/';
      return '/page/' + page + '/';
    }

    input.addEventListener('focus', function () {
      input.select();
    });

    input.addEventListener('keydown', function (event) {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      var requested = parseInt(input.value, 10);
      if (Number.isNaN(requested)) {
        input.value = String(current);
        return;
      }
      requested = Math.max(1, Math.min(total, requested));
      if (requested === current) {
        input.value = String(current);
        input.blur();
        return;
      }
      window.location.href = pageUrl(requested);
    });

    input.addEventListener('blur', function () {
      input.value = String(current);
    });
  });
})();
</script>
{% endif %}
