base_url = "https://michaelreflects.com"
theme = "ergo"

title = "Michael’s Journal"
description = "A quiet place for thoughts, tech, and reflections."
default_language = "en"
author = "Michael Mitchell"

generate_feeds = true
feed_limit = 20
feed_filenames = ["atom.xml", "rss.xml", "feed.json"]

compile_sass = true
build_search_index = true

[search]
index_format = "elasticlunr_json"

[[taxonomies]]
name = "tags"
feed = true

[extra]
# Profile avatar image located at static/img/avatar.png
profile = "avatar.png"
color_themes = ["default", "dark"]
country_flags = false

# Webmention receiving endpoint — self-hosted edge (Cloudflare Worker ->
# tunnel -> RSS Processor receiver -> Web Activity Hub inbox), live 2026-07-05.
# webmention_provider stays "webmentions_io" so the display partial keeps
# showing historical mentions fetched from webmention.io.
webmention_provider = "webmentions_io"
webmention_endpoint  = "https://michaelreflects.com/webmention"

