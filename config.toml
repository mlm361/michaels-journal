base_url = "https://michaelreflects.com"
theme = "ergo"

title = "Michael’s Journal"
description = "A quiet place for thoughts, tech, and reflections."
default_language = "en"
author = "Michael Mitchell"

generate_feeds = true
feed_limit = 20
feed_filenames = ["atom.xml"]

compile_sass = true
build_search_index = true

[search]
index_format = "elasticlunr_json"

[[taxonomies]]
name = "tags"
feed = true

[extra]
# Profile avatar image located at static/img/avatar.png
profile = "avatar.png"
color_themes = ["default", "dark"]
country_flags = false

# Webmention receiving endpoint.
# To cut over to webmention.io: set provider = "webmentions_io" and update
# endpoint to your webmention.io URL (e.g. https://webmention.io/michaels-journal.pages.dev/webmention)
webmention_provider = "webmentions_io"
webmention_endpoint  = "https://webmention.io/michaelreflects.com/webmention"

