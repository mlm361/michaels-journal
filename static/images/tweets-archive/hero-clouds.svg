<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <!-- Cloud wisps right side of banner -->
  <g fill="#ffffff" opacity="0.55">
    <ellipse cx="660" cy="160" rx="120" ry="28"/>
    <ellipse cx="560" cy="170" rx="80" ry="22"/>
    <ellipse cx="730" cy="150" rx="55" ry="18"/>
    <ellipse cx="500" cy="180" rx="50" ry="14"/>
  </g>

  <!-- Small cloud wisps left side of banner -->
  <g fill="#ffffff" opacity="0.4">
    <ellipse cx="80" cy="170" rx="60" ry="16"/>
    <ellipse cx="130" cy="180" rx="40" ry="12"/>
  </g>

  <!-- Subtle high wisps -->
  <g fill="#ffffff" opacity="0.32">
    <ellipse cx="640" cy="60" rx="65" ry="16"/>
    <ellipse cx="700" cy="50" rx="40" ry="11"/>
  </g>

  <!-- Subtle dashed flight arc, right side (NO second bird at end) -->
  <path d="M 540 110 Q 640 60 770 95" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-dasharray="5 6" opacity="0.55"/>
</svg>
