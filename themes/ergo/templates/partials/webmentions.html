{% if config.extra.webmention_provider == "webmentions_io" %}
<style>
  .webmentions { margin-top: 2.5rem; }
  .webmentions-heading {
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(36, 94, 62, 0.85);
    margin: 0 0 0.7rem;
  }
  .webmentions-intro { font-size: 0.9rem; color: rgba(0, 0, 0, 0.58); margin: 0 0 1.3rem; }
  .wm-facepile { margin: 0 0 1.6rem; }
  .wm-facepile-label {
    font-size: 0.95rem;
    color: rgba(0, 0, 0, 0.7);
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    margin-bottom: 0.55rem;
  }
  .wm-facepile-icon { color: #c0584f; }
  .wm-faces { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .wm-face {
    width: 2.15rem;
    height: 2.15rem;
    border-radius: 50%;
    overflow: hidden;
    background: #1d2733;
    border: 1px solid rgba(0, 0, 0, 0.08);
    display: inline-block;
    flex-shrink: 0;
  }
  .wm-face img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wm-face-initial {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    font-size: 0.85rem;
    font-weight: 700;
    color: #f2f2f2;
  }
  .wm-replies-heading { font-size: 0.95rem; font-weight: 700; color: rgba(0, 0, 0, 0.55); margin: 0 0 0.85rem; }
  .wm-card {
    border: 1px solid rgba(128, 128, 128, 0.2);
    border-radius: 12px;
    padding: 1rem 1.15rem;
    margin: 0 0 0.95rem;
  }
  .wm-card-head { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.6rem; }
  .wm-card-avatar {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    overflow: hidden;
    background: #1d2733;
    flex-shrink: 0;
  }
  .wm-card-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wm-card-avatar .wm-face-initial { font-size: 1rem; }
  .wm-card-meta { display: flex; flex-direction: column; line-height: 1.3; min-width: 0; }
  .wm-card-name { font-weight: 700; color: rgba(0, 0, 0, 0.85); text-decoration: none; }
  .wm-card-name:hover { text-decoration: underline; }
  .wm-card-date { font-size: 0.84rem; color: rgba(0, 0, 0, 0.45); }
  .wm-card-content { font-size: 0.96rem; line-height: 1.55; color: rgba(0, 0, 0, 0.82); margin: 0; overflow-wrap: anywhere; }
  html.theme-dark .webmentions-heading { color: rgba(247, 207, 96, 0.9); }
  html.theme-dark .webmentions-intro,
  html.theme-dark .wm-facepile-label,
  html.theme-dark .wm-replies-heading { color: rgba(255, 255, 255, 0.62); }
  html.theme-dark .wm-card { border-color: rgba(255, 255, 255, 0.13); }
  html.theme-dark .wm-card-name { color: rgba(255, 255, 255, 0.9); }
  html.theme-dark .wm-card-content { color: rgba(255, 255, 255, 0.8); }
  html.theme-dark .wm-card-date { color: rgba(255, 255, 255, 0.42); }
</style>
<section class="webmentions" id="webmentions-wrap" aria-labelledby="webmentions-heading">
  <h3 class="webmentions-heading" id="webmentions-heading">Webmentions</h3>
  <p class="webmentions-intro">
    Reply from your own site with a <a href="https://indieweb.org/Webmention" target="_blank" rel="noopener">webmention</a>; they are always welcome.
  </p>

  <div id="webmentions-list" class="webmentions-list" aria-live="polite">
    <p class="webmentions-empty">No webmentions yet. Be the first!</p>
  </div>
</section>

<script>
  (function () {
    var target = encodeURIComponent({{ page.permalink | json_encode | safe }});
    // Syndication URLs for this post (Bluesky/Mastodon/Sharkey/Nostr). The
    // self-hosted engagement index is keyed by these, so they resolve this
    // post's likes/replies gathered from the native platforms.
    var posseUrls = {% if page.extra.posse %}{{ page.extra.posse | json_encode | safe }}{% else %}{}{% endif %};
    var list = document.getElementById("webmentions-list");
    if (!list) return;

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function (char) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
      });
    }

    function safeUrl(value) {
      var url = String(value || "");
      return /^https?:\/\//i.test(url) ? url : "";
    }

    function authorName(mention) {
      return (mention.author && mention.author.name) ? mention.author.name : "Someone";
    }

    function authorUrl(mention) {
      return safeUrl((mention.author && mention.author.url) || mention.url);
    }

    function authorPhoto(mention) {
      return (mention.author && mention.author.photo) ? safeUrl(mention.author.photo) : "";
    }

    function initialFor(mention) {
      var name = authorName(mention).replace(/[^\w]/g, "").trim();
      return name ? name.charAt(0).toUpperCase() : "?";
    }

    function formatDate(value) {
      if (!value) return "";
      var date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function plural(count, singular, pluralValue) {
      return count === 1 ? singular : (pluralValue || singular + "s");
    }

    function stripHtml(html) {
      var d = document.createElement("div");
      d.innerHTML = String(html || "");
      return (d.textContent || d.innerText || "").trim();
    }

    // Circular avatar (photo if present, else an initial). `cls` selects the
    // face size class. Wrapped in the author link when a URL is available.
    function avatar(mention, cls) {
      var photo = authorPhoto(mention);
      var name = escapeHtml(authorName(mention));
      var inner = photo
        ? "<img src='" + escapeHtml(photo) + "' alt='" + name + "' loading='lazy'>"
        : "<span class='wm-face-initial' aria-hidden='true'>" + escapeHtml(initialFor(mention)) + "</span>";
      var href = authorUrl(mention);
      if (href) {
        return "<a class='" + cls + "' href='" + escapeHtml(href) + "' target='_blank' rel='noopener' title='" + name + "'>" + inner + "</a>";
      }
      return "<span class='" + cls + "' title='" + name + "'>" + inner + "</span>";
    }

    function renderFacepile(icon, items, verb) {
      if (!items.length) return "";
      var faces = items.map(function (m) { return avatar(m, "wm-face"); }).join("");
      var label = items.length + " " + escapeHtml(plural(items.length, verb));
      return "<div class='wm-facepile'>"
        + "<div class='wm-facepile-label'><span class='wm-facepile-icon' aria-hidden='true'>" + escapeHtml(icon) + "</span> " + label + "</div>"
        + "<div class='wm-faces'>" + faces + "</div></div>";
    }

    function renderReplyCard(mention) {
      var href = authorUrl(mention);
      var name = escapeHtml(authorName(mention));
      var nameEl = href
        ? "<a class='wm-card-name' href='" + escapeHtml(href) + "' target='_blank' rel='noopener'>" + name + "</a>"
        : "<span class='wm-card-name'>" + name + "</span>";
      var date = formatDate(mention.published);
      var dateEl = date ? "<span class='wm-card-date'>" + escapeHtml(date) + "</span>" : "";
      var c = mention.content || {};
      var raw = c.text ? c.text : (c.html ? stripHtml(c.html) : "");
      var text = raw.length > 500 ? raw.slice(0, 500).trim() + "…" : raw;
      var contentEl = text ? "<p class='wm-card-content'>" + escapeHtml(text) + "</p>" : "";
      return "<article class='wm-card'>"
        + "<div class='wm-card-head'>" + avatar(mention, "wm-card-avatar")
        + "<div class='wm-card-meta'>" + nameEl + dateEl + "</div></div>"
        + contentEl + "</article>";
    }

    // Collapse the same like/repost (by author) or reply (by url) when it
    // arrives from BOTH webmention.io and the self-hosted engagement feed.
    function dedupeChildren(items) {
      var seen = {}, out = [];
      items.forEach(function (m) {
        var prop = m["wm-property"] || "mention-of";
        var a = m.author || {};
        var key;
        if (prop === "like-of" || prop === "repost-of") {
          key = prop + "|" + ((a.url || a.name || "").toLowerCase());
        } else if (m.url) {
          key = "reply|" + m.url;
        } else { out.push(m); return; }
        if (seen[key]) return;
        seen[key] = 1;
        out.push(m);
      });
      return out;
    }

    function renderAll(items) {
      items = dedupeChildren(items);
      var heading = document.getElementById("webmentions-heading");
      if (heading && items.length) heading.textContent = "Webmentions (" + items.length + ")";
      if (!items.length) return;

      var replies = [], likes = [], reposts = [];
      items.forEach(function (mention) {
        var type = mention["wm-property"] || "mention-of";
        if (type === "like-of") likes.push(mention);
        else if (type === "repost-of") reposts.push(mention);
        else if (type === "in-reply-to" || type === "mention-of") replies.push(mention);
        else replies.push(mention);
      });
      replies.sort(function (a, b) { return new Date(a.published || 0) - new Date(b.published || 0); });

      var html = "";
      html += renderFacepile("♥", likes, "like");
      html += renderFacepile("↻", reposts, "repost");
      if (replies.length) {
        html += "<h4 class='wm-replies-heading'>" + replies.length + " " + (replies.length === 1 ? "Reply" : "Replies") + "</h4>";
        html += replies.map(renderReplyCard).join("");
      }
      if (html) list.innerHTML = html;
    }

    // Source 1: true inbound webmentions (webmention.io).
    var wmFetch = fetch("https://webmention.io/api/mentions.jf2?target=" + target + "&per-page=100")
      .then(function (r) { return r.json(); })
      .then(function (d) { return d.children || []; })
      .catch(function () { return []; });

    // Source 2: self-hosted native-platform engagement, resolved from this
    // post's syndication URLs via the committed engagement index.
    var engFetch = fetch("/engagement/index.json")
      .then(function (r) { return r.json(); })
      .then(function (index) {
        var urls = Object.keys(posseUrls || {}).map(function (k) { return posseUrls[k]; });
        var slug = null;
        for (var i = 0; i < urls.length; i++) {
          if (index[urls[i]]) { slug = index[urls[i]]; break; }
        }
        if (!slug) return [];
        return fetch("/engagement/" + slug + ".json")
          .then(function (r) { return r.json(); })
          .then(function (d) { return d.children || []; });
      })
      .catch(function () { return []; });

    Promise.all([wmFetch, engFetch]).then(function (res) {
      renderAll(res[0].concat(res[1]));
    });
  })();
</script>
{% endif %}
